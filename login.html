<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>登录 - 实验器材小网站</title>
<style>
body{text-align:center;margin-top:80px;font-size:17px;font-family:微软雅黑}
input{width:240px;padding:10px;margin:8px 0;font-size:16px}
button{padding:10px 30px;background:#007bff;color:white;border:none;border-radius:6px;font-size:16px}
.err{color:red;margin-top:10px}
</style>
</head>
<body>

<h2>实验器材小网站 登录</h2>
<input id="username" placeholder="输入用户名"><br>
<input id="pwd" type="password" placeholder="输入密码"><br>
<button onclick="login()">登录</button>
<div class="err" id="msg"></div>

<script src="https://cdn.jsdelivr.net/npm/supabase-js"></script>
<script>
const SUPABASE_URL = "https://luzznqngxxqeltlmqjuw.supabase.co";
const SUPABASE_KEY = "暂未填写密钥";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function login() {
  let user = document.getElementById("username").value.trim();
  let pwd = document.getElementById("pwd").value.trim();
  let msg = document.getElementById("msg");

  if(!user || !pwd){
    msg.innerText = "用户名和密码不能为空";
    return;
  }

  let { data } = await supabase
    .from("users")
    .select("*")
    .eq("username", user)
    .eq("password", pwd);

  if(data.length > 0){
    localStorage.setItem("loginUser", user);
    // 关键判断：只有admin能进管理后台
    if(user === "admin"){
      location.href = "admin.html";
    }else{
      location.href = "index.html";
    }
  }else{
    msg.innerText = "用户名或密码错误";
  }
}
</script>

</body>
</html>
