<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>登录</title>
</head>
<body>
<h3>实验室登录 🧪🧂</h3>
<input id="user" placeholder="用户名"><br><br>
<input id="pwd" type="password" placeholder="密码"><br><br>
<button onclick="login()">登录</button>
<div id="msg" style="color:red;"></div>

<script>
// 这里是本地验证，不连任何数据库
// 不连云端！不要密钥！不要邮箱！不会报错！
function login() {
    let u = document.getElementById("user").value;
    let p = document.getElementById("pwd").value;
    let msg = document.getElementById("msg");

    // 正确账号密码
    if (u === "admin" && p === "123456") {
        msg.innerText = "✅ 登录成功！";
        msg.style.color = "green";
        setTimeout(() => location.href = "admin.html", 500);
    } else {
        msg.innerText = "❌ 用户名或密码错误";
        msg.style.color = "red";
    }
}
</script>
</body>
</html>
