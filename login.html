<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>实验室登录 🧪🧂</title>
</head>
<body>
    <h2>实验室登录 🧪🧂</h2>
    <input id="username" placeholder="用户名"><br><br>
    <input id="password" type="password" placeholder="密码"><br><br>
    <button onclick="login()">登录</button>
    <div id="msg" style="color:red;margin-top:10px;"></div>

    <!-- 引入 Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 这里填你自己的 Supabase 项目地址和密钥（我教你怎么找）
        const SUPABASE_URL = "你的项目URL";
        const SUPABASE_KEY = "你的anon/public密钥";

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function login() {
            let username = document.getElementById("username").value.trim();
            let password = document.getElementById("password").value.trim();
            let msg = document.getElementById("msg");

            if (!username || !password) {
                msg.innerText = "用户名或密码不能为空";
                return;
            }

            try {
                // 用Supabase的邮箱/密码登录（你用用户名当邮箱也行）
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: username + "@demo.com", // 自动补全成邮箱格式
                    password: password
                });

                if (error) throw error;

                msg.innerText = "✅ 登录成功！";
                msg.style.color = "green";
                setTimeout(() => location.href = "admin.html", 800);
            } catch (e) {
                msg.innerText = "❌ 账号或密码错误";
            }
        }
    </script>
</body>
</html>
