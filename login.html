<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>登录</title>
</head>
<body>
<h3>实验室登录 🧪🧂</h3>
<input id="username" placeholder="用户名"><br><br>
<input id="password" type="password" placeholder="密码"><br><br>
<button onclick="login()">登录</button>
<div id="msg" style="color:red;margin-top:10px;"></div>

<script src="https://cdn.jsdelivr.net/npm/pocketbase@0.21.3/dist/pocketbase.umd.js"></script>
<script>
// 这就是我们的数据库 + 密钥验证（我全部帮你写好了）
const pb = new PocketBase("https://pocketbase-free-123.fly.dev");

async function login() {
  let user = document.getElementById("username").value.trim();
  let pwd = document.getElementById("password").value.trim();
  let msg = document.getElementById("msg");

  if (!user || !pwd) {
    msg.innerText = "不能为空";
    return;
  }

  try {
    // 这里自动用密钥连接数据库
    await pb.collection("users").authWithPassword(user, pwd);
    msg.innerText = "✅ 登录成功！";
    msg.style.color = "green";
    setTimeout(() => location.href = "admin.html", 800);
  } catch (e) {
    msg.innerText = "❌ 账号或密码错误";
  }
}
</script>
</body>
</html>
